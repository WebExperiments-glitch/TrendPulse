version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trendpulse-backend
    ports:
      - "5000:5000"
    environment:
      - USE_DATABASE=true
      - DATABASE_URL=sqlite:///data/trendpulse.db
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - trendpulse_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/version')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trendpulse-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  trendpulse_data: